<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">← Back</a>
            <h1>Settings</h1>
        </div>
        
        <div class="settings-section">
            <div class="setting-item">
                <label class="setting-label">
                    <input type="checkbox" id="include-bodyweight" {% if settings.include_bw %}checked{% endif %}>
                    <span>Include bodyweight exercises in 1RM calculations</span>
                </label>
                <p class="setting-description">When enabled, exercises without weight (bodyweight exercises) will be included in estimated 1RM calculations.</p>
            </div>
            
            <button id="save-btn" class="sync-btn" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
